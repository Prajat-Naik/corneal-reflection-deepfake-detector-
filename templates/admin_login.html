<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraEye Forensics - System Console Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --primary-glow: rgba(6, 182, 212, 0.35);
            --secondary: #0891b2;
            --accent: #10b981;
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(6, 182, 212, 0.15);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(6, 182, 212, 0.05) 0px, transparent 55%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2.75rem 2.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(6, 182, 212, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .auth-card:hover {
            border-color: rgba(6, 182, 212, 0.25);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.7);
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 40%, #22d3ee 80%, #06b6d4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        .form-label {
            font-family: 'Outfit', sans-serif;
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem 0.9rem 2.75rem;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            width: 1.15rem;
            height: 1.15rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 0.95rem;
            border-radius: 0.75rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px var(--primary-glow);
            filter: brightness(1.1);
        }

        .btn:disabled {
            background: #374151;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }

        .toggle-link {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-left: 0.25rem;
        }

        .toggle-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .success-message {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: #a7f3d0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <span class="logo-icon">
                    <svg style="width:2.5rem;height:2.5rem;fill:currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </span>
                <h1>Console Admin</h1>
                <p class="subtitle">System Operator Node Clearance Authentication</p>
            </div>

            <!-- Feedback panels -->
            <div class="error-message" id="error-box"></div>
            <div class="success-message" id="success-box"></div>

            <!-- Authentication Form -->
            <form id="auth-form">
                <div class="form-group">
                    <label class="form-label">Operator ID / Admin Username</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="username" placeholder="Enter admin username" required>
                        <span class="input-icon">
                            <svg style="width:1.15rem;height:1.15rem;fill:currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Console Access Key</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                        <span class="input-icon">
                            <svg style="width:1.15rem;height:1.15rem;fill:currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn" id="submit-btn">
                    <span id="btn-text">Authenticate Admin Console</span>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
            </form>

            <p class="toggle-text" style="margin-top: 1.5rem;">
                Need console deployment? 
                <a href="/admin/register" class="toggle-link">Create Account</a>
            </p>
            
            <p class="toggle-text" style="margin-top: 1rem; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1rem;">
                Standard Auditor? 
                <a href="/login" class="toggle-link" style="color: var(--primary);">Access Auditor Portal</a>
            </p>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('btn-spinner');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Admin verification failed.');
                }

                successBox.style.display = 'block';
                successBox.textContent = "Admin clearance verified. Handshaking Console...";
                
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);

            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.textContent = err.message;
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
